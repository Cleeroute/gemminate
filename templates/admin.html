<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemminate - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #e5e7eb; }
        .cursor-border { border-color: #2a2a2a; }
        .cursor-sidebar { background-color: #1a1a1a; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="bg-gray-900 border-b cursor-border px-8 py-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Gemminate Admin</h1>
        </div>
        <div class="flex items-center space-x-6">
            <span class="text-sm text-gray-500">System Administrator: {{ user.email }}</span>
            <a href="/dashboard" class="text-sm font-medium text-blue-500 hover:text-blue-400 transition-colors flex items-center gap-2">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                Dashboard
            </a>
            <button onclick="logout()" class="text-sm font-medium text-red-500 hover:text-red-400 transition-colors">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto mt-12 p-6">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-white">Registered Users</h2>
            <div class="bg-gray-800 border cursor-border rounded-xl px-4 py-2 text-sm text-gray-400">
                Total Users: {{ users|length }}
            </div>
        </div>
        
        <div class="bg-gray-900 border cursor-border rounded-2xl shadow-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-800/50 text-gray-500 uppercase text-[10px] font-bold tracking-widest border-b cursor-border">
                        <th class="py-4 px-6">User ID</th>
                        <th class="py-4 px-6">Email Identity</th>
                        <th class="py-4 px-6">Security Hash (partial)</th>
                    </tr>
                </thead>
                <tbody class="divide-y cursor-border">
                    {% for u in users %}
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="py-4 px-6 text-sm font-mono text-blue-400">#{{ u.id }}</td>
                        <td class="py-4 px-6 text-sm font-medium text-gray-200">{{ u.email }}</td>
                        <td class="py-4 px-6 text-xs font-mono text-gray-600">{{ u.hashed_password[:30] }}...</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        lucide.createIcons();
        async function logout() {
            const res = await fetch('/api/logout', { method: 'POST' });
            if (res.ok) {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>

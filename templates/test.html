<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF extraction & Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .tree-node { margin-left: 20px; border-left: 1px solid #ccc; padding-left: 10px; }
        .loading { display: none; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6">PDF Page extraction & Detail Analysis</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Select PDF</label>
                <input type="file" id="pdfFile" accept="application/pdf" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Page Range (e.g., 345,400)</label>
                <input type="text" id="pageRange" placeholder="345,400" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
        </div>

        <button id="processBtn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 disabled:bg-gray-400">Process PDF</button>

        <div id="status" class="mt-4 text-sm text-gray-600"></div>

        <div id="loading" class="loading mt-4 flex items-center">
            <svg class="animate-spin h-5 w-5 mr-3 text-blue-600" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Processing pages... This may take a while.</span>
        </div>

        <div id="results" class="mt-8">
            <h2 class="text-xl font-bold mb-4">Hierarchical Structure (Tree)</h2>
            <div id="treeContainer" class="bg-gray-50 p-4 rounded border"></div>

            <h2 class="text-xl font-bold mt-8 mb-4">Page Details</h2>
            <div id="detailsContainer" class="space-y-4"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const processBtn = document.getElementById('processBtn');
        const pdfFileInput = document.getElementById('pdfFile');
        const pageRangeInput = document.getElementById('pageRange');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const treeContainer = document.getElementById('treeContainer');
        const detailsContainer = document.getElementById('detailsContainer');

        processBtn.addEventListener('click', async () => {
            const file = pdfFileInput.files[0];
            const rangeStr = pageRangeInput.value.trim();

            if (!file || !rangeStr) {
                alert('Please select a file and specify a page range.');
                return;
            }

            const rangeMatch = rangeStr.match(/^(\d+),(\d+)$/);
            if (!rangeMatch) {
                alert('Invalid range format. Use start,end (e.g., 345,400)');
                return;
            }

            const startPage = parseInt(rangeMatch[1]);
            const endPage = parseInt(rangeMatch[2]);

            if (startPage > endPage) {
                alert('Start page cannot be greater than end page.');
                return;
            }

            const startTime = performance.now();
            processBtn.disabled = true;
            loading.style.display = 'flex';
            treeContainer.innerHTML = '';
            detailsContainer.innerHTML = '';
            status.textContent = 'Reading PDF...';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                const totalPages = pdf.numPages;
                const actualStart = Math.max(1, startPage);
                const actualEnd = Math.min(totalPages, endPage);

                status.textContent = `Extracting pages ${actualStart} to ${actualEnd}...`;

                const MAX_CONCURRENT = 3;
                const results = [];
                const pageData = [];

                // Pre-extract all text content first (local and fast)
                for (let i = actualStart; i <= actualEnd; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const text = textContent.items.map(item => item.str).join(' ');
                    pageData.push({ i, text });
                }

                // Process in batches to avoid overwhelming the server
                for (let i = 0; i < pageData.length; i += MAX_CONCURRENT) {
                    const batch = pageData.slice(i, i + MAX_CONCURRENT);
                    status.textContent = `Analyzing pages batch ${Math.floor(i/MAX_CONCURRENT) + 1} (${batch.length} pages)...`;
                    
                    const batchPromises = batch.map(data => 
                        fetch('/api/analyze-page', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                page_number: data.i,
                                content: data.text 
                            })
                        }).then(async res => {
                            if (!res.ok) {
                                const errText = await res.text();
                                throw new Error(`Server error on page ${data.i}: ${errText}`);
                            }
                            const result = await res.json();
                            appendDetail(result);
                            return result;
                        })
                    );
                    
                    const batchResults = await Promise.all(batchPromises);
                    results.push(...batchResults);
                }

                // Sort results by page number to ensure they are in order before forming the tree
                const pageSummaries = results.sort((a, b) => a.page_number - b.page_number);

                status.textContent = 'Generating hierarchical structure from ordered summaries...';
                const treeResponse = await fetch('/api/generate-tree', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ summaries: pageSummaries })
                });

                if (!treeResponse.ok) throw new Error('Failed to generate tree');
                const treeData = await treeResponse.json();
                renderTree(treeData.tree, treeContainer);

                const endTime = performance.now();
                const timeTaken = ((endTime - startTime) / 1000).toFixed(2);
                status.textContent = `Processing complete! Total time: ${timeTaken} seconds.`;
            } catch (error) {
                console.error(error);
                status.textContent = `Error: ${error.message}`;
            } finally {
                processBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function appendDetail(result) {
            const div = document.createElement('div');
            div.className = 'bg-white p-4 border rounded shadow-sm';
            div.innerHTML = `
                <h3 class="font-bold border-b pb-2 mb-2">Page ${result.page_number}</h3>
                <div class="prose prose-sm max-w-none text-gray-700">
                    ${result.analysis.replace(/\n/g, '<br>')}
                </div>
            `;
            detailsContainer.appendChild(div);
        }

        function renderTree(nodes, container) {
            const ul = document.createElement('ul');
            ul.className = 'tree-node list-disc';
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'py-1';
                li.innerHTML = `<span class="font-semibold">${node.title}</span>`;
                if (node.children && node.children.length > 0) {
                    renderTree(node.children, li);
                }
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }
    </script>
</body>
</html>
